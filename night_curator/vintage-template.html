<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{TITLE}}</title><style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Serif+SC:wght@500;700;900&display=swap');
:root{--gold:#d7b56d;--gold2:#fff1b8;--ink:#f3ead8;--muted:#b9a98a;--bg:#07050b;--wine:#241019;--blue:#0b1424}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:'Noto Serif SC',serif;line-height:1.75;background:radial-gradient(circle at 50% -10%,#37223a 0,#14101c 34%,#07050b 72%)}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.18;background-image:repeating-linear-gradient(45deg,#fff 0 1px,transparent 1px 18px),repeating-linear-gradient(-45deg,#d7b56d 0 1px,transparent 1px 22px);mix-blend-mode:overlay}body:after{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at center,transparent 45%,#000 100%);opacity:.55}.wrap{position:relative;z-index:1;max-width:1160px;margin:auto;padding:42px 24px 80px}.frame{border:1px solid #8c6a35;padding:22px;border-radius:28px;background:linear-gradient(145deg,#130e19cc,#09070ccc);box-shadow:0 0 0 1px #f7d88933 inset,0 30px 90px #0009}.hero{border:1px solid #d7b56d88;border-radius:22px;padding:28px;background:linear-gradient(135deg,#211322cc,#0b1424cc);position:relative;overflow:hidden}.hero:before{content:"✦";position:absolute;right:28px;top:18px;color:#d7b56d;font-size:52px;opacity:.32}.eyebrow{font-family:'Cinzel',serif;color:var(--gold2);letter-spacing:.22em;text-transform:uppercase;font-weight:900;font-size:14px}.daySeal{display:inline-flex;align-items:center;gap:10px;margin-top:12px;border:1px solid #d7b56daa;border-radius:999px;padding:8px 14px;background:#05050aaa;color:var(--gold2);font-family:'Cinzel',serif;letter-spacing:.08em}.hero h1{font-size:46px;margin:14px 0 8px;letter-spacing:.03em;text-shadow:0 2px 0 #000;color:#f8e7bd}.sub{color:var(--muted);font-size:18px;margin:0}.progress{margin:20px 0;color:var(--gold2);font-family:'Cinzel','Noto Serif SC',serif}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:22px}.tile{aspect-ratio:1/1;border:2px solid transparent;border-radius:18px;background-image:linear-gradient(#111827,#111827),linear-gradient(135deg,#fff1b8,#8c5f22,#fff1b8);background-origin:border-box;background-clip:padding-box,border-box;position:relative;overflow:hidden;cursor:pointer;box-shadow:0 18px 40px #0008}.tile:before{content:"";position:absolute;inset:0;background-image:url('comic.png');background-size:300% 300%;background-position:inherit;transition:.2s}.tile:hover:before{transform:scale(1.035);filter:saturate(1.08) contrast(1.06)}.tile.locked:before{filter:grayscale(1) brightness(.32)}.tile.done{box-shadow:0 0 0 2px #8be09a,0 18px 40px #0008}.lock{position:absolute;inset:0;display:grid;place-items:center;font-size:44px;background:#0008;color:var(--gold2)}.modal{position:fixed;inset:0;background:#000c;display:none;align-items:center;justify-content:center;padding:22px;z-index:10}.modal.show{display:flex}.sheet{max-width:900px;max-height:88vh;overflow:auto;border:2px solid transparent;border-radius:28px;background-image:linear-gradient(145deg,#15101b,#08070c),linear-gradient(135deg,#fff1b8,#7a4c17,#e5c778,#fff1b8);background-origin:border-box;background-clip:padding-box,border-box;box-shadow:0 30px 100px #000;padding:30px}.sheet h2{margin:0;color:#f8e7bd;font-size:34px}.tag{font-family:'Cinzel',serif;color:var(--gold);letter-spacing:.08em}.block h3{color:var(--gold2);margin:22px 0 6px;font-family:'Cinzel','Noto Serif SC',serif}.choices button{display:block;width:100%;text-align:left;margin:12px 0;padding:14px 16px;border-radius:14px;border:1px solid #a98345;background:#130e19;color:#f3ead8;cursor:pointer;font-family:'Noto Serif SC',serif}.choices button:hover:not(:disabled){background:#211322}.ok{border-color:#7fe096!important;background:#12321f!important}.bad{border-color:#c95b5b!important;background:#351719!important}.feedback{min-height:28px;margin-top:12px;font-weight:700}.unlock{color:#8be09a}.wrong{color:#ffaaaa}.close{float:right;background:#0000;color:#d7b56d;border:0;font-size:30px;cursor:pointer}.hint{color:var(--muted);font-size:14px}@media(max-width:760px){.grid{grid-template-columns:1fr 1fr}.hero h1{font-size:34px}}@media(max-width:520px){.grid{grid-template-columns:1fr}}
</style></head><body><div class="wrap"><div class="frame"><header class="hero"><div class="eyebrow">The Night Curator</div><div class="daySeal">✦ {{DAY_LABEL}} ✦</div><h1>{{TITLE}}</h1><p class="sub">{{SUBTITLE}}</p></header><div class="progress" id="progress"></div><main class="grid" id="grid"></main></div></div><div class="modal" id="modal"><section class="sheet" id="sheet"></section></div><script src="data.js"></script><script>
let unlocked=1;const done=new Set();let current=null;const grid=document.getElementById('grid'),modal=document.getElementById('modal'),sheet=document.getElementById('sheet'),progress=document.getElementById('progress');function render(){progress.textContent=`Unlocked ${unlocked} / ${panels.length} · 解开馆藏谜题，点亮下一幅分镜`;grid.innerHTML='';panels.forEach((p,i)=>{const locked=i>=unlocked;const d=document.createElement('button');d.className='tile'+(locked?' locked':'')+(done.has(i)?' done':'');d.style.backgroundPosition=`${(i%3)*50}% ${Math.floor(i/3)*50}%`;d.innerHTML=locked?'<span class="lock">◆</span>':'';d.onclick=()=>{if(!locked)openPanel(i)};grid.appendChild(d)})}function openPanel(i){current=i;const p=panels[i];sheet.innerHTML=`<button class="close" onclick="closePanel()">×</button><div class="tag">Panel ${i+1} · ${p.m}</div><h2>${p.t}</h2><div class="block"><h3>Story</h3><p>${p.story}</p><h3>Curator Note</h3><p>${p.note}</p><h3>Your Move</h3><p>${p.q}</p><p class="hint">高阶题：需要结合剧情、文物背景和文化语境判断。</p><div class="choices">${p.choices.map((c,j)=>`<button onclick="answer(${j})">${String.fromCharCode(65+j)}. ${c}</button>`).join('')}</div><div class="feedback" id="feedback"></div></div>`;modal.classList.add('show')}function closePanel(){modal.classList.remove('show')}function answer(j){const p=panels[current],fb=document.getElementById('feedback');document.querySelectorAll('.choices button').forEach((b,k)=>{b.disabled=true;if(k===p.a)b.classList.add('ok');if(k===j&&j!==p.a)b.classList.add('bad')});if(j===p.a){done.add(current);fb.className='feedback unlock';fb.textContent=p.why+' 下一幅分镜已点亮。';if(unlocked<current+2&&unlocked<panels.length)unlocked=current+2;setTimeout(()=>{closePanel();render()},1400)}else{fb.className='feedback wrong';fb.textContent='不对。绿色选项是正确答案：'+p.why;setTimeout(()=>{closePanel();render()},2600)}}modal.addEventListener('click',e=>{if(e.target===modal)closePanel()});render();
</script></body></html>
